<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="icon" href="../img/logo.png" type="image/icon type">
  <link href="css/andere.css" rel="stylesheet" type="text/css" />
  <link href='https://fonts.googleapis.com/css?family=Jura' rel='stylesheet'>
  <link href='https://fonts.googleapis.com/css?family=Luckiest Guy' rel='stylesheet'>
</head>

<body>
  <article>
    <br>
    <br>
    <h2 style="text-align: center; font-family: 'Luckiest Guy';">Contacteer ons!</h2>

    <div style="overflow:hidden;max-width:100%;width:500px;height:500px;">
      <div id="google-maps-canvas" style="height:100%; width:100%;max-width:100%;"><iframe
          style="height:100%;width:100%;border:0;" frameborder="0"
          src="https://www.google.com/maps/embed/v1/place?q=Eindhoven,+Nederland&key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8"></iframe>
      </div><a class="googlecoder" href="https://www.bootstrapskins.com/themes" id="make-map-infor-mation">premium
        bootstrap themes</a>
      <style>
        #google-maps-canvas img {
          max-height: none;
          max-width: none !important;
          background: none !important;
        }
      </style>
    </div>
    <hr>
    <br>
    <div class="formDiv">
      <form onsubmit="FormFunction()">
        <label>Volledige naam: *</label> <br>
        <input type="text" required minlength="2"> <br> <br>
        <label>E-mailadres: *</label> <br>
        <input type="email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$"> <br> <br>
        <label>Uw vraag: *</label> <br>
        <input type="text" id="vraagInput" required minlength="20">
        <br><br> <button onclick="submit()" id="submitBtn">Verzenden</button>
      </form>
    </div>
  </article>
  <script src="script.js"></script>
</body>

</html>
